services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ferraso
      POSTGRES_PASSWORD: ferraso123
      POSTGRES_DB: ferraso_cms
    ports:
      - "5435:5432"
    volumes:
      - ferraso_cms_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferraso -d ferraso_cms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ferraso_cms_pg_data:
